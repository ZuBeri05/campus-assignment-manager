server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/cam?useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  smtp:
    enabled: false
